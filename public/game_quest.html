<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Main css file -->
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/game.css">
    <!-- Specific css file -->
    <link rel="stylesheet" href="./css/quest.css">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Specific js file -->
    <script src="./js/quest.js" defer></script>
    <script src="./js/script.js"></script>
    <script src="./js/game.js" defer></script>
    <script src="./js/queryCmd.js"></script>

    <title>BED CA2 Quest</title>

    <!-- Website icon -->
    <link rel="shortcut icon" type="image/x-icon" href="./images/website-game-icon.png">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">

            <a class="navbar-brand" href="#"><img id="MDB-logo"
                src="../images/game_icon.png" alt="Game logo"
                draggable="false" height="50" />
            </a>
            <h3>Cook Out</h3>

            <button class="navbar-toggler" type="button" data-mdb-collapse-init data-mdb-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse d-flex flex-row-reverse" id="navbarSupportedContent">

                <ul class="navbar-nav">
                    <li class="nav-item me-3" id="adminTab">
                        <a class="nav-link d-flex flex-column align-items-center" href="game_admin.html">
                            <img src="./images/admin_icon.png" alt="Admin" class="format-icon">
                            Admin
                        </a>
                    </li>

                    <li class="nav-item me-3">
                        <a class="nav-link d-flex flex-column align-items-center active bg-info" href="game_quest.html">
                            <img src="../images/quest_icon.png" alt="Quest" class="format-icon">
                            Quest
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="game_cooking.html">
                            <img src="../images/cooking_icon.png" alt="Cooking" class="format-icon">
                            Cooking
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="game_feed.html">
                            <img src="./images/snorlax_icon.png" alt="Feed" class="format-icon">
                            Feed
                        </a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link d-flex flex-column align-items-center" href="game_shop.html">
                        <img src="../images/shop_icon.png" alt="Shop" class="format-icon">
                        Shop
                    </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="game_inventory.html">
                            <img src="../images/inventory_icon.png" alt="Inventory" class="format-icon">
                            Inventory
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex flex-column align-items-center" href="game_profile.html">
                            <img src="../images/profile_icon.png" alt="Profile" class="format-icon">
                            Profile
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="quest-bg">
        <div class="container mx-5">
        </div>

        <!-- Shows user points -->
        <div id="pointsField" class="position-absolute top-0 end-0 m-3 p-2">
            <img src="./images/points_icon.png" alt="Points" class="me-1 format-points-icon">
            <span id="currentPoints" class="h3">0</span>
        </div>


        <!-- Quest Carousel -->
        <div class="carousel-wrapper">
            <div id="carouselExampleIndicators" class="carousel slide">
                <!-- Carousel Indicators -->
                <div class="carousel-indicators" id="indicators">
                    <!-- Added in JS -->
                </div>

                <div class="carousel-inner" id="carouselItemField">
                    <!-- Content added in JS -->
                </div>

                <!-- Previous button -->
                <button class="carousel-control-prev" type="button"
                        data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon h-50"></span>
                    <span class="visually-hidden">Previous</span>
                </button>

                <!-- Next button -->
                <button class="carousel-control-next" type="button"
                        data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon h-50"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>    

        <!-- Create challenge -->
        <button type="button" class="btn btn-lg btn-primary border rounded-5 border-primary" id="create-button">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                </svg>          
                Create
        </button>
    
        <!-- <div class="position-absolute start-0 bottom-0 m-4"> -->
            <button type="button" class="btn btn-lg btn-warning rounded-5" id="viewChallengeRecordsBtn">
                View Challenge Records
            </button>
        <!-- </div> -->
        

        <!-- Modal that pops up when complete button is clicked to get challenge details -->
        <div class="modal fade" id="challengeDetailsModal" tabindex="-1" aria-labelledby="createChallengeModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="challengeDetailsModalTitle">Challenge Details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form id="challengeForm">
                            <div class="mb-3">
                                <label for="challengeDetailsField" class="form-label">Description</label>
                                <textarea class="form-control" id="challengeDetailsField" required></textarea>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary" id="submitChallengeBtn">Submit</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>

        <!-- Modal that pops up when create challenge is clicked -->
        <div class="modal fade" id="createChallengeModal" tabindex="-1" aria-labelledby="createChallengeModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="createChallengeModalTitle">Create Challenge</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form id="createChallengeForm">

                            <!-- Gets challenge description -->
                            <div class="mb-3">
                                <label for="createChallengeDetailsField" class="form-label">Enter your Challenge Description</label>
                                <textarea class="form-control" id="createChallengeDetailsField" required></textarea>
                            </div>

                            <!-- Gets challenge points -->
                            <div>
                                <label for="createChallengePointsField" class="form-label">Enter the number of Points earned from your Challenge</label>
                                <input class="form-control" type="number" min="1" id="createChallengePointsField" required>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button type="submit" class="btn btn-primary" id="createChallengeSubmitBtn">Submit</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>

        <!-- Modal for view challnge details -->
        <div class="modal modal-lg fade" id="viewChallengeRecordsModal" tabindex="-1" aria-labelledby="viewChallengeRecordsModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="viewChallengeRecordsModalTitle">Challenge Records</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body" id="viewChallengeRecordsModalBody">
                        <!-- Challenge tabs -->
                        <ul class="nav nav-tabs" id="challengeRecordsTab">
                            <li class="nav-item">
                                <button class="nav-link active" id="completedChallengesTab" data-bs-toggle="tab" data-bs-target="#completedChallenges" type="button">Challenge completed</button>
                            </li>

                            <li class="nav-item">
                                <button class="nav-link" id="createdChallengesTab" data-bs-toggle="tab" data-bs-target="#createdChallenges" type="button">Challenges created</button>
                            </li>
                        </ul>

                        <!-- Tab content -->
                        <div class="tab-content mt-3">

                            <!-- Completed challenges tab -->
                            <div class="tab-pane fade show active" id="completedChallenges" role="tabpanel">
                                <div class="container" id="completedChallengesContainer">
                                    <!-- Content added in JS -->
                                </div>
                            </div>

                            <!-- Created Challenges tab -->
                            <div class="tab-pane fade" id="createdChallenges" role="tabpanel">
                                <div class="container" id="createdChallengesContainer">
                                    <!-- Content added in JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Toasts Success -->
        <div class="position-fixed bottom-0 end-0">
            <!-- Toast that the shows when challenge is successfully completed -->
            <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" id="successToast" style="z-index: 1055;">
                <div class="toast-header success-toast">
                    <strong class="me-auto">Challenge completed</strong>
                    <small class="text-muted">Good job!</small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body">
                    Completion record created
                </div>
            </div>
        </div>

        <!-- Toasts Error -->
        <div class="position-fixed bottom-0 end-0">
            <!-- Toast that the shows when challenge is successfully completed -->
            <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" id="errorToast" style="z-index: 1055;">
                <div class="toast-header danger-toast">
                    <strong class="me-auto">Challenge was not created</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body" id="error-text"></div>
            </div>
        </div>

        <div class="position-fixed bottom-0 end-0">
        <!-- Toast that the shows when challenge is successfully created -->
            <div class="toast" role="alert" aria-live="assertive" aria-atomic="true" id="challengeCreatedToast" style="z-index: 1060;">
                <div class="toast-header success-toast">
                    <strong class="me-auto">Challenge created</strong>
                    <small class="text-muted">Nice job!</small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body">
                    Challenge created. Check it out. 
                </div>
            </div>
        </div>
    </div>


</body>
</html>
